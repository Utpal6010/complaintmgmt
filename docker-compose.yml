version: '3.8'
services:
  mongodb:
    image: mongo:7.0
    container_name: ac_support_db
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: support_db
    volumes:
      - mongo_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - support_network

  mongo-express:
    image: mongo-express:latest
    container_name: ac_support_mongo_ui
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
    depends_on:
      - mongodb
    networks:
      - support_network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ac_support_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./:/app:rw
    environment:
      - DEBUG=1
      - SECRET_KEY=dev-secret
      - ALLOWED_HOSTS=localhost,0.0.0.0
    depends_on:
      - mongodb
    networks:
      - support_network

volumes:
  mongo_data:

networks:
  support_network:
    driver: bridge
